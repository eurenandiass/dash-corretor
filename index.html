<div id="page-simulador" class="page-content">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-3xl font-bold text-white tracking-tight">Simulador Financeiro Pro</h2>
                <p class="text-gray-500">Análise técnica de viabilidade e sistemas de amortização.</p>
            </div>
            <div class="bg-brand-gold/10 text-brand-gold px-4 py-2 rounded-lg border border-brand-gold/20 text-xs font-bold uppercase tracking-widest">
                Módulo Bank-Ready
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 bg-brand-card p-6 rounded-3xl border border-brand-border space-y-5">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-black mb-2 block tracking-widest">Valor do Imóvel</label>
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-gray-500 text-sm font-bold">R$</span>
                        <input type="number" id="vImovel" class="w-full p-4 pl-10 rounded-xl font-bold" value="500000">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-black mb-2 block tracking-widest">Entrada</label>
                    <div class="relative">
                        <span class="absolute left-4 top-4 text-gray-500 text-sm font-bold">R$</span>
                        <input type="number" id="vEntrada" class="w-full p-4 pl-10 rounded-xl" value="100000">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black mb-2 block tracking-widest">Prazo (Meses)</label>
                        <input type="number" id="vPrazo" class="w-full p-4 rounded-xl" value="360">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase font-black mb-2 block tracking-widest">Juros (% a.a.)</label>
                        <input type="number" id="vTaxa" class="w-full p-4 rounded-xl" value="10.5" step="0.1">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase font-black mb-2 block tracking-widest text-brand-gold">Sistema de Amortização</label>
                    <select id="vSistema" class="w-full p-4 rounded-xl font-bold cursor-pointer">
                        <option value="SAC">SAC (Decrescente)</option>
                        <option value="PRICE">PRICE (Fixa)</option>
                    </select>
                </div>
                <button onclick="processarCalculoPro()" class="w-full py-5 bg-brand-gold text-black font-black rounded-2xl uppercase tracking-[0.2em] shadow-xl hover:translate-y-[-2px] transition-all">
                    Processar Análise
                </button>
            </div>

            <div id="res-calculo" class="lg:col-span-2 space-y-6 hidden animate-fade-in">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="bg-brand-card p-6 rounded-3xl border border-brand-border">
                        <p class="text-gray-500 text-[10px] uppercase font-bold mb-1">Primeira Parcela</p>
                        <h3 id="res-primeira" class="text-3xl font-black text-white">R$ 0,00</h3>
                    </div>
                    <div class="bg-brand-card p-6 rounded-3xl border border-brand-border">
                        <p class="text-gray-500 text-[10px] uppercase font-bold mb-1">Última Parcela</p>
                        <h3 id="res-ultima" class="text-3xl font-black text-gray-400">R$ 0,00</h3>
                    </div>
                </div>

                <div class="bg-brand-card p-8 rounded-3xl border border-brand-border">
                    <div class="flex flex-col md:flex-row items-center gap-8">
                        <div class="w-full md:w-1/2">
                            <canvas id="loanChart"></canvas>
                        </div>
                        <div class="w-full md:w-1/2 space-y-4">
                            <div>
                                <p class="text-gray-500 text-[10px] uppercase font-bold">Total em Juros</p>
                                <h4 id="res-juros-total" class="text-xl font-bold text-red-400">R$ 0,00</h4>
                            </div>
                            <div class="h-[1px] bg-brand-border"></div>
                            <div>
                                <p class="text-gray-500 text-[10px] uppercase font-bold">Custo Efetivo Total (CET)</p>
                                <h4 id="res-cet" class="text-2xl font-black text-brand-gold">R$ 0,00</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let loanChart = null;

function processarCalculoPro() {
    const vImovel = parseFloat(document.getElementById('vImovel').value);
    const vEntrada = parseFloat(document.getElementById('vEntrada').value);
    const n = parseInt(document.getElementById('vPrazo').value);
    const iAnual = parseFloat(document.getElementById('vTaxa').value) / 100;
    const sistema = document.getElementById('vSistema').value;

    const saldoDevedor = vImovel - vEntrada;
    const iMensal = Math.pow(1 + iAnual, 1/12) - 1; // Juros Compostos Reais

    let primeiraParcela, ultimaParcela, totalPago, totalJuros;

    if (sistema === "PRICE") {
        primeiraParcela = (saldoDevedor * iMensal) / (1 - Math.pow(1 + iMensal, -n));
        ultimaParcela = primeiraParcela;
        totalPago = primeiraParcela * n;
        totalJuros = totalPago - saldoDevedor;
    } else {
        // Lógica SAC
        const amortizacaoConstante = saldoDevedor / n;
        primeiraParcela = amortizacaoConstante + (saldoDevedor * iMensal);
        ultimaParcela = amortizacaoConstante + (amortizacaoConstante * iMensal);
        
        // Soma da PA para juros do SAC
        totalJuros = ((saldoDevedor * iMensal) + (amortizacaoConstante * iMensal)) * n / 2;
        totalPago = saldoDevedor + totalJuros;
    }

    // Exibir e Formatar
    document.getElementById('res-calculo').classList.remove('hidden');
    document.getElementById('res-primeira').innerText = formatMoeda(primeiraParcela);
    document.getElementById('res-ultima').innerText = formatMoeda(ultimaParcela);
    document.getElementById('res-juros-total').innerText = formatMoeda(totalJuros);
    document.getElementById('res-cet').innerText = formatMoeda(totalPago);

    updateChart(saldoDevedor, totalJuros);
}

function formatMoeda(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function updateChart(principal, juros) {
    const ctx = document.getElementById('loanChart').getContext('2d');
    
    if(loanChart) loanChart.destroy();
    
    loanChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Financiado', 'Juros'],
            datasets: [{
                data: [principal, juros],
                backgroundColor: ['#D4AF37', '#232326'],
                borderWidth: 0,
                hoverOffset: 4
            }]
        },
        options: {
            cutout: '70%',
            plugins: {
                legend: { position: 'bottom', labels: { color: '#555', font: { size: 10 } } }
            }
        }
    });
}
</script>
